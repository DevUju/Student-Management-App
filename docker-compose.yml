services:
  postgres:
    image: postgres:16-alpine
    container_name: student-api-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: student_db

    ports:
      - '5433:5432'

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - app-network

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d student_db']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production

    container_name: student-api-app
    restart: unless-stopped

    env_file:
      - .env.docker

    ports:
      - '3000:3000'

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: student-api-pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - '5050:80'

    depends_on:
      - postgres

    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
